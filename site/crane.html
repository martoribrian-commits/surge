<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0A0A0A">
  <title>Surge — Crane</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/site.css">
</head>
<body class="immersive-page">
  <div class="home-grain" aria-hidden="true"></div>

  <div class="crane-screen">
    <header class="immersive-header">
      <div data-surge-lockup="sm" data-surge-theme="dark" data-surge-href="index.html"></div>
      <p class="landing-kicker landing-kicker-clay immersive-kicker">Crane</p>
    </header>

    <div id="crane-gate" class="crane-gate" hidden>
      <p class="crane-gate-text">
        Crane is available through your clinical provider.
        <a id="crane-gate-link" href="clinical-token.html">Enter your token</a>
        to continue.
      </p>
    </div>

    <div id="crane-messages" class="crane-messages"></div>
    <div class="crane-input-wrap">
      <input
        type="text"
        id="crane-input"
        class="crane-input"
        placeholder="Speak."
        autocomplete="off"
      >
    </div>
  </div>

  <script src="js/surge-brand.js"></script>
  <script src="js/crane.js"></script>
</body>
</html>
