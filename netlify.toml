[build]
  publish = "site"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Clean URL redirects
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/engine"
  to = "/engine.html"
  status = 200

[[redirects]]
  from = "/how-it-works"
  to = "/how-it-works.html"
  status = 200

[[redirects]]
  from = "/for-providers"
  to = "/for-providers.html"
  status = 200

[[redirects]]
  from = "/clinical-token"
  to = "/clinical-token.html"
  status = 200

[[redirects]]
  from = "/crane"
  to = "/crane.html"
  status = 200

[[redirects]]
  from = "/api/validate-token"
  to = "/.netlify/functions/validate-token"
  status = 200
  force = true

[[redirects]]
  from = "/api/crane"
  to = "/.netlify/functions/crane"
  status = 200
  force = true
