[build]
  command = "cd web && npm ci && npm run build"
  publish = "web/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# API → Netlify Functions
[[redirects]]
  from = "/api/validate-token"
  to = "/.netlify/functions/validate-token"
  status = 200
  force = true

[[redirects]]
  from = "/api/crane"
  to = "/.netlify/functions/crane"
  status = 200
  force = true

[[redirects]]
  from = "/api/engine-anchor"
  to = "/.netlify/functions/engine-anchor"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-tokens"
  to = "/.netlify/functions/portal-tokens"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-generate"
  to = "/.netlify/functions/portal-generate"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-stats"
  to = "/.netlify/functions/portal-stats"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-sessions"
  to = "/.netlify/functions/portal-sessions"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-revoke"
  to = "/.netlify/functions/portal-revoke"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-export"
  to = "/.netlify/functions/portal-export"
  status = 200
  force = true

[[redirects]]
  from = "/api/portal-team"
  to = "/.netlify/functions/portal-team"
  status = 200
  force = true

[[redirects]]
  from = "/api/crane-inference"
  to = "/.netlify/functions/crane-inference"
  status = 200
  force = true

[[redirects]]
  from = "/.netlify/functions/crane-inference"
  to = "/.netlify/functions/crane-inference"
  status = 200

# Legacy static HTML → React routes
[[redirects]]
  from = "/engine"
  to = "/start"
  status = 301

[[redirects]]
  from = "/engine.html"
  to = "/start"
  status = 301

[[redirects]]
  from = "/how-it-works.html"
  to = "/how-it-works"
  status = 301

[[redirects]]
  from = "/portal.html"
  to = "/portal"
  status = 301

[[redirects]]
  from = "/for-providers.html"
  to = "/for-providers"
  status = 301

[[redirects]]
  from = "/clinical-token.html"
  to = "/clinical-token"
  status = 301

[[redirects]]
  from = "/faq.html"
  to = "/faq"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# SPA fallback — React app handles all client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
